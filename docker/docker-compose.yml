services:
  dreamzero-inference:
    build:
      context: ..
      dockerfile: docker/dreamzero-inference/Dockerfile
    container_name: dreamzero-inference
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - ATTENTION_BACKEND=${ATTENTION_BACKEND:-TE}
      - ENABLE_DIT_CACHE=${ENABLE_DIT_CACHE:-true}
      - NCCL_DEBUG=WARN
    volumes:
      - /home/ubuntu/Dreamzero/checkpoints:/checkpoints:ro
      - /home/ubuntu/Dreamzero/output/inference:/output
      - /home/ubuntu/Dreamzero/repo/socket_test_optimized_AR.py:/app/socket_test_optimized_AR.py:ro
      - /home/ubuntu/Dreamzero/repo/eval_utils:/app/eval_utils:ro
      - /home/ubuntu/Dreamzero/repo/configs:/app/configs:ro
    ports:
      - "${DREAMZERO_PORT:-8000}:8000"
    command: >
      --nproc_per_node=${NUM_INFERENCE_GPUS:-1}
      --standalone
      socket_test_optimized_AR.py
      --port 8000
      --model-path ${MODEL_PATH:-/checkpoints/dreamzero_franka_orca_lora}
      --enable-dit-cache
      --embodiment franka_orca_bimanual
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    networks:
      - dreamzero-net

  isaac-sim:
    build:
      context: ..
      dockerfile: docker/isaac-sim/Dockerfile
    container_name: isaac-sim
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - OMNI_KIT_ALLOW_ROOT=1
      - ACCEPT_EULA=Y
      - LIVESTREAM_ENABLED=true
    volumes:
      - /home/ubuntu/Dreamzero/output/sim:/output
      - /home/ubuntu/Dreamzero/repo/sim_envs:/app/sim_envs:ro
      - /home/ubuntu/Dreamzero/repo/eval_utils:/app/eval_utils:ro
      - /home/ubuntu/Dreamzero/repo/configs:/app/configs:ro
    ports:
      - "${LIVESTREAM_PORT:-8211}:8211"
      - "${LIVESTREAM_DATA_PORT:-49100}:49100"
    command: >
      eval_utils/run_sim_eval_bimanual.py
      --headless
      --enable omni.kit.livestream.native
      --host dreamzero-inference
      --port 8000
      --instruction "${EVAL_INSTRUCTION:-pick up the object}"
      --episodes ${EVAL_EPISODES:-10}
      --open-loop-horizon ${EVAL_OPEN_LOOP_HORIZON:-24}
    depends_on:
      dreamzero-inference:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    networks:
      - dreamzero-net

  dreamzero-training:
    build:
      context: ..
      dockerfile: docker/dreamzero-training/Dockerfile
      args:
        BASE_IMAGE: ${TRAINING_BASE_IMAGE:-nvcr.io/nvidia/pytorch:24.12-py3}
    container_name: dreamzero-training
    runtime: nvidia
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - FRANKA_ORCA_DATA_ROOT=/data/franka_orca_lerobot
      - OUTPUT_DIR=/output
      - WAN_CKPT_DIR=/checkpoints/Wan2.1-I2V-14B-480P
      - TOKENIZER_DIR=/checkpoints/umt5-xxl
      - PRETRAINED_PATH=/checkpoints/DreamZero-AgiBot
      - HF_TOKEN=${HF_TOKEN:-}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - NUM_GPUS=${NUM_GPUS:-}
      - NCCL_DEBUG=WARN
    volumes:
      # Source code + entrypoint (mounted so edits don't need rebuild)
      - /home/ubuntu/Dreamzero/repo/groot:/app/groot:ro
      - /home/ubuntu/Dreamzero/repo/configs:/app/configs:ro
      - /home/ubuntu/Dreamzero/repo/scripts:/app/scripts:ro
      - /home/ubuntu/Dreamzero/repo/docker/dreamzero-training/entrypoint.sh:/entrypoint.sh
      # Data, checkpoints, output
      - /home/ubuntu/Dreamzero/data:/data:ro
      - /home/ubuntu/Dreamzero/checkpoints:/checkpoints
      - /home/ubuntu/Dreamzero/output:/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

networks:
  dreamzero-net:
    driver: bridge
